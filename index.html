<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear Search Visualizer</title>
    <meta name="description" content="An interactive Linear Search Visualizer built with HTML, CSS, and Vanilla JavaScript." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card top-section">
        <header class="header">
          <h1 class="title">Linear Search Visualizer</h1>
          <p class="subtitle">Watch how linear search scans through elements one by one</p>
        </header>

        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-label">Array Size</span>
            <span class="stat-value" id="array-size">25</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Status</span>
            <span class="stat-value" id="status-text">Ready</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Steps</span>
            <span class="stat-value" id="steps-count">0</span>
          </div>
        </div>
      </section>

      <section class="card visualization-section">
        <div class="bar-container" id="bar-container" role="img" aria-label="Array visualization bars">
          <!-- Bars generated by JavaScript -->
        </div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-dot default"></span>
            <span>Unsearched</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot current"></span>
            <span>Comparing</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot found"></span>
            <span>Found</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot searched"></span>
            <span>Searched</span>
          </div>
        </div>
      </section>

      <section class="controls-layout">
        <section class="card section">
          <h2 class="section-title">Array Setup</h2>

          <div class="row compact-row">
            <div class="input-group">
              <label for="array-size-input" class="input-label">Array Size</label>
              <input
                type="number"
                id="array-size-input"
                class="input"
                placeholder="5-60"
                min="5"
                max="60"
                aria-label="Set array size"
              />
            </div>
            <button id="btn-apply-size" class="btn btn-secondary" onclick="updateArraySize()" aria-label="Apply array size">
              Set Size
            </button>
          </div>

          <div class="row">
            <div class="input-group grow">
              <label for="array-input" class="input-label">Insert Array (comma-separated)</label>
              <input
                type="text"
                id="array-input"
                class="input"
                placeholder="Example: 12, 7, 34, 9"
                aria-label="Insert custom array"
              />
            </div>
            <button id="btn-apply-array" class="btn btn-accent" onclick="applyCustomArray()" aria-label="Apply custom array">
              Apply Array
            </button>
          </div>

          <div class="row compact-row">
            <div class="input-group">
              <label for="element-input" class="input-label">Insert Element</label>
              <input
                type="number"
                id="element-input"
                class="input"
                placeholder="1-100"
                min="1"
                max="100"
                aria-label="Insert element into array"
              />
            </div>
            <button id="btn-add-element" class="btn btn-secondary" onclick="addArrayElement()" aria-label="Add element to array">
              Add Element
            </button>
          </div>
        </section>

        <section class="card section">
          <h2 class="section-title">Search Controls</h2>

          <div class="row compact-row">
            <div class="input-group grow">
              <label for="target-input" class="input-label">Target Value</label>
              <input
                type="number"
                id="target-input"
                class="input"
                placeholder="Enter value (1-100)"
                min="1"
                max="100"
                aria-label="Target value to search"
              />
            </div>
            <button id="btn-search" class="btn btn-primary" onclick="startLinearSearch()" aria-label="Start linear search">
              Start Search
            </button>
          </div>
        </section>

        <section class="card section">
          <h2 class="section-title">Actions</h2>

          <div class="row actions-row">
            <button id="btn-reset" class="btn btn-secondary" onclick="resetArray()" aria-label="Reset array colors">
              Reset
            </button>
            <button id="btn-generate" class="btn btn-accent" onclick="generateArray()" aria-label="Generate new random array">
              New Array
            </button>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
